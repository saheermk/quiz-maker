<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Maker | PSC Practice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Malayalam', sans-serif; background-color: #f8fafc; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .config-panel { width: 95%; max-width: 800px; background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        #data-editor { width: 100%; height: 250px; font-family: 'Fira Code', monospace; font-size: 13px; padding: 1rem; border-radius: 12px; border: 1px solid #cbd5e1; background: #fafafa; white-space: pre; outline: none; transition: border-color 0.2s; }
        #data-editor:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .preview-wrapper { width: 300px; aspect-ratio: 9/16; background: #000; border-radius: 16px; overflow: hidden; display: none; border: 6px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; }
        canvas { width: 100%; height: 100%; object-fit: contain; background: white; }
        .rec-label { position: absolute; top: 12px; left: 12px; background: rgba(220, 38, 38, 0.9); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; animation: pulse 1s infinite; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <!-- UI Setup -->
    <div id="ui-setup" class="config-panel">
        <h1 class="text-2xl font-black text-slate-800 mb-2">Quiz Maker Advanced</h1>
        <p class="text-sm text-slate-500 mb-6">Paste your <code class="bg-slate-100 px-1 rounded">quizData</code> below and click generate.</p>
        
        <textarea id="data-editor" spellcheck="false">const quizData = [
    {
        q: "'ഒരു ജാതി ഒരു മതം ഒരു ദൈവം മനുഷ്യന്' എന്ന് പ്രഖ്യാപിച്ചത് ആര്?",
        options: ["ശ്രീനാരായണ ഗുരു", "അയ്യങ്കാളി", "ചട്ടപ്പി സ്വാമികൾ", "വാഗ്ഭടാനന്ദൻ"],
        correct: 0
    },
    {
        q: "കേരളത്തിലെ ഏറ്റവും നീളം കൂടിയ നദി ഏതാണ്?",
        options: ["ഭാരതപ്പുഴ", "പെരിയാർ", "പമ്പ", "ചാലിയാർ"],
        correct: 1
    },
    {
        q: "വില്ലുവണ്ടി സമരം നയിച്ചത് ആര്?",
        options: ["കുമാരനാശാൻ", "മന്നത്ത് പത്മനാഭൻ", "അയ്യങ്കാളി", "കെ. കേളപ്പൻ"],
        correct: 2
    }
];</textarea>

        <div class="mt-6 flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Target Quality</label>
                <div class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700">
                    1080p (Full HD) • 30 FPS • WebM Container
                </div>
            </div>
            <button onclick="startEngine()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-xl shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-2">
                Generate Video
            </button>
        </div>
    </div>

    <!-- Live Renderer -->
    <div id="ui-render" class="hidden text-center">
        <div class="preview-wrapper mx-auto">
            <div class="rec-label">
                <span class="w-2 h-2 bg-white rounded-full"></span> GENERATING
            </div>
            <canvas id="offscreenCanvas" width="1080" height="1920"></canvas>
        </div>
        <div id="status-msg" class="mt-8 text-xl font-bold text-blue-600">Preparing quiz video...</div>
        <p class="text-slate-400 text-xs mt-2">Please keep this tab active while the video is being generated.</p>
    </div>

    <script>
        let quizData = [];
        let audioCtx, streamDest, mediaRecorder, tickBuffer, wakeLock = null;
        let recordedChunks = [];
        let cancelled = false;
        const canvas = document.getElementById('offscreenCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Keep Screen Active — re-acquire on visibility change (browser releases it when tab is hidden)
        async function lockScreen() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && mediaRecorder && mediaRecorder.state === 'recording') {
                await lockScreen();
            }
        });

        // Professional Audio Path
        async function initAudioEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            streamDest = audioCtx.createMediaStreamDestination();
            
            // Generate standard 'Percussive Tick'
            const sr = audioCtx.sampleRate;
            tickBuffer = audioCtx.createBuffer(1, sr * 0.1, sr);
            const data = tickBuffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const t = i / sr;
                data[i] = Math.sin(2 * Math.PI * 1100 * t) * Math.exp(-60 * t);
            }

            // Silent hum to prevent the stream from clipping or sleeping
            const noise = audioCtx.createGain();
            noise.gain.value = 0.00001; 
            const osc = audioCtx.createOscillator();
            osc.connect(noise); noise.connect(streamDest);
            osc.start();
        }

        function triggerTick() {
            const src = audioCtx.createBufferSource();
            src.buffer = tickBuffer;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.7;
            src.connect(gain);
            gain.connect(streamDest);
            gain.connect(audioCtx.destination);
            src.start(audioCtx.currentTime);
        }

        function triggerKeyClick() {
    const sr = audioCtx.sampleRate;
    const now = audioCtx.currentTime;

    // --- Layer 1: Thock body (low-mid punch) ---
    const thockFrames = Math.floor(sr * 0.06);
    const thockBuf = audioCtx.createBuffer(1, thockFrames, sr);
    const thockData = thockBuf.getChannelData(0);
    for (let i = 0; i < thockFrames; i++) {
        thockData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.012));
    }
    const thockSrc = audioCtx.createBufferSource();
    thockSrc.buffer = thockBuf;

    const thockBP = audioCtx.createBiquadFilter();
    thockBP.type = 'bandpass';
    thockBP.frequency.value = 420;   // The "body" of the keypress
    thockBP.Q.value = 1.2;

    const thockGain = audioCtx.createGain();
    thockGain.gain.setValueAtTime(0.35, now);
    thockGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.055);

    thockSrc.connect(thockBP);
    thockBP.connect(thockGain);
    thockGain.connect(audioCtx.destination);

    // --- Layer 2: Tick (high plastic snap) ---
    const tickFrames = Math.floor(sr * 0.018);
    const tickBuf = audioCtx.createBuffer(1, tickFrames, sr);
    const tickData = tickBuf.getChannelData(0);
    for (let i = 0; i < tickFrames; i++) {
        tickData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.004));
    }
    const tickSrc = audioCtx.createBufferSource();
    tickSrc.buffer = tickBuf;

    const tickHP = audioCtx.createBiquadFilter();
    tickHP.type = 'highpass';
    tickHP.frequency.value = 3500;   // Crisp plastic snap frequency

    const tickGain = audioCtx.createGain();
    tickGain.gain.setValueAtTime(0.22, now);
    tickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.015);

    tickSrc.connect(tickHP);
    tickHP.connect(tickGain);
    tickGain.connect(audioCtx.destination);

    // --- Layer 3: Subtle key-up "clack" echo (4ms later) ---
    const clackFrames = Math.floor(sr * 0.012);
    const clackBuf = audioCtx.createBuffer(1, clackFrames, sr);
    const clackData = clackBuf.getChannelData(0);
    for (let i = 0; i < clackFrames; i++) {
        clackData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.003));
    }
    const clackSrc = audioCtx.createBufferSource();
    clackSrc.buffer = clackBuf;

    const clackBP = audioCtx.createBiquadFilter();
    clackBP.type = 'bandpass';
    clackBP.frequency.value = 900;
    clackBP.Q.value = 2.0;

    const clackGain = audioCtx.createGain();
    clackGain.gain.setValueAtTime(0.09, now + 0.004);  // slight delay = key rebound
    clackGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.018);

    clackSrc.connect(clackBP);
    clackBP.connect(clackGain);
    clackGain.connect(audioCtx.destination);

    // Fire all layers
    thockSrc.start(now);
    tickSrc.start(now);
    clackSrc.start(now + 0.004);  // clack hits slightly after

    // Route to streamDest so it gets recorded in the video export
    thockGain.connect(streamDest);
    tickGain.connect(streamDest);
    clackGain.connect(streamDest);
}

        async function startEngine() {
            const raw = document.getElementById('data-editor').value;
            try {
                const evalData = raw.replace('const quizData =', '').trim().replace(/;$/, '');
                quizData = eval(evalData);
            } catch (e) { return alert("Syntax Error in quizData!"); }

            document.getElementById('ui-setup').classList.add('hidden');
            document.getElementById('ui-render').classList.remove('hidden');
            document.getElementById('ui-render').querySelector('.preview-wrapper').style.display = 'block';

            await lockScreen();
            await initAudioEngine();

            // Direct Canvas Capture (No Screen Share Window needed)
            const videoStream = canvas.captureStream(30);
            const tracks = [...videoStream.getVideoTracks(), ...streamDest.stream.getAudioTracks()];
            const mergedStream = new MediaStream(tracks);

            // Force WebM container output
            let options = { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm', videoBitsPerSecond: 8000000 };
            }

            mediaRecorder = new MediaRecorder(mergedStream, options);
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = finalizeExport;
            
            cancelled = false;
            recordedChunks = [];
            mediaRecorder.start(100);
            statusMsg('Encoding Frames...');
            startQuizProcess();
        }

        function statusMsg(m) { document.getElementById('status-msg').innerText = m; }

        async function startQuizProcess() {
            for (let i = 0; i < quizData.length; i++) {
                if (cancelled) return;
                const item = quizData[i];

                // 1. Typing Question
                for (let c = 0; c <= item.q.length; c++) {
                    if (cancelled) return;
                    render(item.q.substring(0, c), [], -1, null, i+1);
                    if (c > 0) triggerKeyClick();
                    await wait(50);
                }
                if (cancelled) return;
                await wait(1500);

                // 2. Show Options
                if (cancelled) return;
                render(item.q, item.options, -1, null, i+1);
                await wait(1000);

                // 3. Countdown Loop
                for (let count = 3; count > 0; count--) {
                    if (cancelled) return;
                    triggerTick();
                    render(item.q, item.options, -1, count, i+1);
                    await wait(1000);
                }

                // 4. Highlight Answer
                if (cancelled) return;
                render(item.q, item.options, item.correct, null, i+1);
                await wait(2500);
            }
            if (!cancelled) mediaRecorder.stop();
        }

        function render(q, opts, ansIdx, timer, num) {
            // White Background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Progress Text
            ctx.fillStyle = "#94a3b8";
            ctx.font = "bold 40px 'Noto Sans Malayalam'";
            ctx.textAlign = "center";
            ctx.fillText(`QUESTION ${num} / ${quizData.length}`, canvas.width / 2, 140);

            // Question Text (Centered Wrap)
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 68px 'Noto Sans Malayalam'";
            ctx.textBaseline = "middle";
            drawWrappedText(q, canvas.width / 2, 450, 920, 100);

            // Option Boxes
            opts.forEach((text, idx) => {
                const y = 1000 + (idx * 190);
                const isActive = idx === ansIdx;
                
                ctx.lineWidth = 6;
                ctx.strokeStyle = isActive ? "#10b981" : "#f1f5f9";
                ctx.fillStyle = isActive ? "#10b981" : "#f8fafc";
                
                roundRect(100, y - 85, 880, 170, 30, true, true);
                
                ctx.fillStyle = isActive ? "white" : "#334155";
                ctx.font = "52px 'Noto Sans Malayalam'";
                ctx.fillText(text, canvas.width / 2, y);
            });

            // Countdown Timer
            if (timer !== null) {
                ctx.fillStyle = "#ef4444";
                ctx.font = "bold 350px Arial";
                ctx.fillText(timer, canvas.width / 2, 1800);
            }
        }

        function drawWrappedText(text, x, y, maxW, lineH) {
            const words = text.split(' ');
            let line = '';
            let cy = y;
            for(let n = 0; n < words.length; n++) {
                let test = line + words[n] + ' ';
                if (ctx.measureText(test).width > maxW && n > 0) {
                    ctx.fillText(line, x, cy); line = words[n] + ' '; cy += lineH;
                } else { line = test; }
            }
            ctx.fillText(line, x, cy);
        }

        function roundRect(x,y,w,h,r,f,s) {
            ctx.beginPath();
            ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
            ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
            ctx.closePath();
            if(f) ctx.fill(); if(s) ctx.stroke();
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function finalizeExport() {
            const mime = mediaRecorder.mimeType;
            const blob = new Blob(recordedChunks, { type: mime });
            const url = URL.createObjectURL(blob);
            const ext = 'webm';
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `Quiz_HD_${Date.now()}.${ext}`;
            link.click();
            
            statusMsg(cancelled ? 'Generation cancelled. Partial video saved.' : 'Download complete. Video saved.');
            if (wakeLock) wakeLock.release();
        }
    </script>

    <!-- Footer -->
    <footer style="width:100%; margin-top:auto; padding:1.5rem 1rem; text-align:center; border-top:1px solid #e2e8f0; background:#f8fafc;">
        <p style="margin:0; font-size:13px; color:#94a3b8; font-family:'Noto Sans Malayalam',sans-serif;">
            Built for PSC aspirants &nbsp;·&nbsp;
            <a href="https://github.com/saheermk/quiz-maker" target="_blank" rel="noopener noreferrer"
               style="color:#3b82f6; text-decoration:none; font-weight:600;">
                GitHub
            </a>
            &nbsp;·&nbsp; &copy; <span id="footer-year"></span> Quiz Maker
        </p>
    </footer>
    <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
